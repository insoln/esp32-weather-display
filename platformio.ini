; PlatformIO Project Configuration File
; Weather Station — ESP32-S3 + ILI9488 3.5" SPI display

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = COM3
monitor_port = COM3

; Custom partition table: 3 MB app + 4.9 MB LittleFS
board_build.partitions = partitions.csv

; Enable octal PSRAM (8 MB on this Freenove board, AP_3v3 type)
board_build.arduino.memory_type = qio_opi

; LittleFS filesystem image from data/ directory
board_build.filesystem = littlefs

build_flags =
    -DBOARD_HAS_PSRAM

lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    bblanchon/ArduinoJson@^7.3.0
